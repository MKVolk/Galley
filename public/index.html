<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Audio Player</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background: #f0f1f2;
      color: #010101;
      margin: 0;
    }

    h2 {
      color: #8b0103;
    }

    .player {
      background: #e8e4da;
      padding: 20px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }

    button {
      margin: 5px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .controls {
      margin-top: 10px;
    }

    input[type="range"] {
      width: 100%;
    }

    .content{
      display: flex;
      flex-direction: column;
    }
    
  </style>
</head>
<body>
  <div class="content">

  <!-- Sala 1 -->
  <div class="player">
    <h2>Sala 1</h2>

    <audio id="audio" src="./audio/sala1-es.opus"></audio>

    <div class="controls">
      <button id="playPause">Play</button>
      <button id="stop">Stop</button>
    </div>

    <div>
      <label>Progress</label>
      <input type="range" id="progress" value="0" min="0" max="100" />
    </div>

    <div>
      <label>Volume</label>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="1" />
    </div>
  </div>
