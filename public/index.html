<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Player</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f1f2;
      color: #010101;
    }

    .player {
      width: 340px;
      padding: 20px;
      background: #e8e4da;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    h2 {
      text-align: center;
      color: #8b0103;
      margin-top: 0;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    select,
    input[type="range"] {
      width: 100%;
      box-sizing: border-box;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #8b0103;
      color: white;
      font-size: 15px;
    }

    button:hover {
      opacity: .9;
    }
  </style>
</head>
<body>

<div class="player">

  <h2>Museo Misional</h2>

  <label for="trackSelect">Selecciona la sala</label>

  <select id="trackSelect">
    <option value="./audio/sala1-es.opus">Sala 1</option>
    <option value="./audio/sala2-es.opus">Sala 2</option>
    <option value="./audio/sala3-es.opus">Sala 3</option>
    <option value="./audio/sala4-es.opus">Sala 4</option>
    <option value="./audio/sala5-es.opus">Sala 5</option>
    <option value="./audio/sala6-es.opus">Sala 6</option>
    <option value="./audio/sala7-es.opus">Sala 7</option>
    <option value="./audio/sala8-es.opus">Sala 8</option>
  </select>

  <audio id="audio" src="./audio/sala1-es.opus"></audio>

  <div class="controls">
    <button id="playPause">Play</button>
    <button id="stop">Stop</button>
  </div>

  <input
    type="range"
    id="progress"
    min="0"
    max="100"
    value="0">

  <label for="volume">Volumen</label>
  <input
    type="range"
    id="volume"
    min="0"
    max="1"
    step="0.01"
    value="1">

</div>

<script>
const audio = document.getElementById("audio");
const playPauseBtn = document.getElementById("playPause");
const stopBtn = document.getElementById("stop");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");
const trackSelect = document.getElementById("trackSelect");

// Change audio when dropdown changes
trackSelect.addEventListener("change", () => {
    const wasPlaying = !audio.paused;

    audio.src = trackSelect.value;
    audio.load();

    progress.value = 0;
    playPauseBtn.textContent = "Play";

    if (wasPlaying) {
        audio.play();
        playPauseBtn.textContent = "Pause";
    }
});

// Play / Pause
playPauseBtn.addEventListener("click", () => {
    if (audio.paused) {
        audio.play();
        playPauseBtn.textContent = "Pause";
    } else {
        audio.pause();
        playPauseBtn.textContent = "Play";
    }
});

// Stop
stopBtn.addEventListener("click", () => {
    audio.pause();
    audio.currentTime = 0;
    playPauseBtn.textContent = "Play";
});

// Update progress
audio.addEventListener("timeupdate", () => {
    if (audio.duration) {
        progress.value = (audio.currentTime / audio.duration) * 100;
    }
});

// Seek
progress.addEventListener("input", () => {
    if (audio.duration) {
        audio.currentTime = (progress.value / 100) * audio.duration;
    }
});

// Volume
volume.addEventListener("input", () => {
    audio.volume = volume.value;
});

// Audio ended
audio.addEventListener("ended", () => {
    playPauseBtn.textContent = "Play";
    progress.value = 0;
});

// Initial volume
audio.volume = volume.value;
</script>

</body>
</html>
